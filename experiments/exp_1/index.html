<!DOCTYPE html>
<html>
<head>
    <title>Structural Interaction</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- jsPsych 8.1.0 — match norming_study version -->
    <script src="https://unpkg.com/jspsych@8.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.0.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.0.0"></script>
    <!-- DataPipe -->
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>

    <!-- experiment config (first — defines constants) -->
    <script src="config.js"></script>

    <!-- components (order matters: utils before trials, trials before experiment) -->
    <script src="components/utils.js"></script>
    <script src="components/learning_trial.js"></script>
    <script src="components/validation_trials.js"></script>
    <script src="components/transfer_trial.js"></script>
    <script src="components/demographics.js"></script>

    <!-- main experiment -->
    <script src="experiment.js"></script>

    <!-- styles -->
    <link href="https://unpkg.com/jspsych@8.1.0/css/jspsych.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <script>
        window.onbeforeunload = function() {
            return "Please do not refresh or go back — your data may not be saved!";
        };

        window.onload = async function() {
            // pick random condition and graph at landing
            var condition = Math.random() < 0.5 ? 'homophily' : 'category';
            var graphId   = Math.floor(Math.random() * NUM_GRAPHS) + 1;
            var graphIdStr = String(graphId).padStart(2, '0');

            try {
                var resp = await fetch('stimuli/graphs/graph_' + graphIdStr + '.json');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var graphData = await resp.json();
                initStudy(graphData, condition);
            } catch (e) {
                console.error('failed to load graph:', e);
                document.body.innerHTML = `
                    <div style='font-family:Helvetica Neue,Arial,sans-serif; text-align:center;
                        margin:15vh auto; max-width:600px; color:#333;'>
                        <p style='font-size:22px; font-weight:600;'>Failed to load the study.</p>
                        <p style='font-size:16px; color:#666;'>
                            Error: ${e.message}<br>
                            Please refresh or contact the research team.
                        </p>
                    </div>`;
            }
        };
    </script>
</head>
<body></body>
</html>
